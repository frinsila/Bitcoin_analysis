<!DOCTYPE html>
<html>
<head>
    <title>Bitcoin Dashboard</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #111;
            color: white;
        }

        .card {
            margin: 50px auto;
            width: 300px;
            padding: 20px;
            background: #222;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .price {
            font-size: 40px;
            color: #f7931a;
            margin-top: 10px;
        }

        .note {
            margin-top: 20px;
            font-size: 14px;
            color: gray;
        }
    </style>
</head>

<body>

<h1>₿ Btcoin Dashboard</h1>

<div class="card">
    <h2>BTC / USD</h2>

    <!-- 🔥 DATA FROM POSTGRESQL -->
    <div class="price">${{ name }}</div>

    <div class="note">
        Email: {{ email }}
    </div>
</div>

</body>
</html>
